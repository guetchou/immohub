
name: Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Frontend Dependencies
      run: npm ci
        
    - name: Build Frontend
      run: npm run build
      
    - name: Install Backend Dependencies
      run: |
        cd backend
        npm ci
        
    - name: Run Tests
      run: |
        npm test || echo "No frontend tests yet"
        cd backend
        npm test || echo "No backend tests yet"
        
    - name: Build Docker Images
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker build -t immohub-frontend:latest .
        cd backend
        docker build -t immohub-backend:latest .
        
    - name: Login to DockerHub
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Push to DockerHub
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # Tag with GitHub SHA
        docker tag immohub-frontend:latest yourusername/immohub-frontend:${{ github.sha }}
        docker tag immohub-frontend:latest yourusername/immohub-frontend:latest
        docker tag immohub-backend:latest yourusername/immohub-backend:${{ github.sha }}
        docker tag immohub-backend:latest yourusername/immohub-backend:latest
        
        # Push images
        docker push yourusername/immohub-frontend:${{ github.sha }}
        docker push yourusername/immohub-frontend:latest
        docker push yourusername/immohub-backend:${{ github.sha }}
        docker push yourusername/immohub-backend:latest
        
    - name: Deploy to Production
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "Deploying to production server..."
        # Add deployment steps here - SSH, Ansible, or other deployment methods
