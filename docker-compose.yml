services:
  immohub-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: immohub-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3011"
      DATABASE_PATH: /data/immohub.sqlite
      STATIC_DIR: /app/dist
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:3011:3011"
    # Note WSL2: si 127.0.0.1 ne bind pas, utiliser "3011:3011"
